        }).catch(async (error) => {
            if (error.message === '用户取消' || error.name === 'AbortError') throw error;
            logWarn(`OpenAI Edits 请求失败 (剩余重试: ${retryLeft}):`, error.message);
            if (retryLeft > 0) {
                log(`2秒后重试...`);
                await new Promise(r => setTimeout(r, 2000));

    // ========== Gemini 协议（保留兼容） ==========
    async function generateGemini(prompt, images, endpoint, apiKey, model, aspectRatio, imageSize, retryLeft, requestTimeout, downloadTimeout, task) {
        const parts = [{ text: prompt }];
        for (const img of images) {
            parts.push({ inlineData: { mimeType: img.mime, data: img.data } });
        }
        const payload = {
            contents: [{ role: "user", parts }],
            generationConfig: {
                responseModalities: ["IMAGE", "TEXT"],
                temperature: 1.0, topP: 0.95, maxOutputTokens: 8192,
                imageConfig: { aspectRatio, imageSize }
            }
        };
        const url = `${endpoint.replace(/\/$/, '')}/models/${model}:generateContent`;
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), requestTimeout * 1000);

        // 暴露 controller 给任务卡片用于取消
        if (task) task.setAbortController(controller);

        log(`POST ${url}`, `model=${model}, ratio=${aspectRatio}, size=${imageSize}`);
        if (task) task.setProgress(10, '连接中...');
        const avgDur = getAverageDuration();
        if (task && avgDur) task.setProgress(15, 'waiting', formatEta(avgDur));
        try {
            const resp = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify(payload),
                signal: controller.signal
            });
            clearTimeout(timeoutId);
            log(`Gemini 响应: HTTP ${resp.status}`);
            if (task) task.setProgress(80, '响应接收中...');
            if (!resp.ok) {
                const errText = (await resp.text()).slice(0, 300);
                logError('Gemini 错误响应:', errText);
                throw new Error(`HTTP ${resp.status}: ${errText}`);
            }
            const data = await resp.json();
            return extractGeminiResponse(data, downloadTimeout);
        } catch (error) {
            clearTimeout(timeoutId);
            if (error.name === 'AbortError') {
                throw new Error('用户取消');
            }
            logWarn(`Gemini 请求失败 (剩余重试: ${retryLeft}):`, error.message);
            if (retryLeft > 0) {
                log(`1.5秒后重试...`);
                await new Promise(r => setTimeout(r, 1500));
                return generateGemini(prompt, images, endpoint, apiKey, model, aspectRatio, imageSize, retryLeft - 1, requestTimeout, downloadTimeout, task);
            }
            throw error;
        }
    }

    async function extractGeminiResponse(data, downloadTimeout) {
        if (data.candidates?.[0]?.content?.parts) {
            const parts = data.candidates[0].content.parts;
            for (const part of parts) {
                if (part.inlineData?.data) {
                    return { type: 'image', data: part.inlineData.data, mime: part.inlineData.mimeType || 'image/png' };
                }
            }
            for (const part of parts) {
                if (part.text) {
                    const text = part.text;
                    const urlMatch = text.match(/!\[.*?\]\((https?:\/\/[^\s\)]+)\)/) ||
                        text.match(/\[.*?\]\((https?:\/\/[^\s\)]+)\)/) ||
                        text.match(/(https?:\/\/[^\s]+\.(jpg|jpeg|png|webp|gif))/i);
                    if (urlMatch) {
                        const imageUrl = urlMatch[1] || urlMatch[0];
                        try {
                            const imgController = new AbortController();
                            const imgTimeout = setTimeout(() => imgController.abort(), downloadTimeout * 1000);
                            const imgResp = await fetch(imageUrl, { signal: imgController.signal });
                            clearTimeout(imgTimeout);
                            if (imgResp.ok) {
                                const blob = await imgResp.blob();
                                const base64 = await new Promise((res, rej) => {
                                    const reader = new FileReader();
                                    reader.onload = () => res(reader.result.split(',')[1]);
                                    reader.onerror = rej;
                                    reader.readAsDataURL(blob);
                                });
                                return { type: 'image', data: base64, mime: blob.type };
                            }
                        } catch (e) { /* fallback to text */ }
                    }
                    return { type: 'text', data: text };
                }
            }
        }
        throw new Error('Gemini 响应中未包含图片');
    }

    async function downloadImage(dataUrl, originalMime, filename = 'image') {
        const asPng = downloadAsPngCheck.checked;
        if (!asPng) {
            const a = document.createElement('a');
            a.href = dataUrl;
            a.download = filename + (originalMime.includes('png') ? '.png' : '.jpg');
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            return;
        }

        const img = new Image();
        img.src = dataUrl;
        await new Promise((resolve, reject) => {
            img.onload = resolve;
            img.onerror = reject;
        });
        const canvas = document.createElement('canvas');
        canvas.width = img.naturalWidth;
        canvas.height = img.naturalHeight;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0);
        canvas.toBlob((blob) => {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename + '.png';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }, 'image/png');
    }

    function escapeHtml(unsafe) {
        return unsafe.replace(/[&<>"]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' })[m]);
    }

    // 加载历史记录
    async function loadHistory() {
        try {
            const tasks = await loadTasksFromDB();
            tasksContainer.innerHTML = '';
            if (tasks.length === 0) {
                tasksContainer.innerHTML = '<div style="color:#777; text-align:center; grid-column:1/-1; padding:40px;">暂无历史记录</div>';
                return;
            }
            tasks.forEach(task => {
                const card = document.createElement('div');
                card.className = 'task-card';
                if (task.type === 'error') card.classList.add('error');

                const header = document.createElement('div');
                header.className = 'task-header';

                const row1 = document.createElement('div');
                row1.className = 'task-header-row';
                const titleSpan = document.createElement('span');
                titleSpan.className = 'task-title';
                const date = new Date(task.timestamp);
                titleSpan.innerHTML = `📋 ${date.toLocaleTimeString()}`;
                const statusSpan = document.createElement('span');
                statusSpan.className = 'task-status';
                statusSpan.textContent = task.status || (task.type === 'error' ? '失败' : '已完成');
                row1.appendChild(titleSpan);
                row1.appendChild(statusSpan);

                const promptRow = document.createElement('div');
                promptRow.className = 'task-prompt-row';
                const promptSpan = document.createElement('span');
                promptSpan.className = 'prompt-text';
                const promptText = task.prompt || '无描述词';
                promptSpan.textContent = promptText.length > 30 ? promptText.substring(0,30) + '…' : promptText;
                promptSpan.title = promptText;
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-prompt-btn';
                copyBtn.innerHTML = '📋';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(promptText).then(() => {
                        copyBtn.innerHTML = '✅';
                        setTimeout(() => copyBtn.innerHTML = '📋', 1500);
                    }).catch(() => alert('复制失败'));
                };
                promptRow.appendChild(promptSpan);
                promptRow.appendChild(copyBtn);

                header.appendChild(row1);
                header.appendChild(promptRow);

                const contentDiv = document.createElement('div');
                contentDiv.className = 'task-content';

                if (task.type === 'image' && task.imageDataUrl) {
                    contentDiv.innerHTML = `<img src="${task.imageDataUrl}" class="generated-image" alt="图片">`;
                    const downloadBtn = document.createElement('button');
                    downloadBtn.className = 'download-btn';
                    downloadBtn.innerHTML = '⬇️ 下载图片';
                    downloadBtn.onclick = () => {
                        downloadImage(task.imageDataUrl, task.mime || 'image/png', `gemini_${task.timestamp}`);
                    };
                    contentDiv.appendChild(downloadBtn);
                } else if (task.type === 'text' && task.text) {
                    contentDiv.innerHTML = `<div class="response-text">${escapeHtml(task.text)}</div>`;
                } else if (task.type === 'error' && task.error) {
                    contentDiv.innerHTML = `<div class="error-message">❌ ${escapeHtml(task.error)}</div>`;
                }

                // 添加操作按钮
                const actionsDiv = document.createElement('div');
                actionsDiv.className = 'task-actions';
                const regenBtn = document.createElement('button');
                regenBtn.className = 'task-action-btn action-regen';
                regenBtn.innerHTML = '🔄 重新生成';
                regenBtn.onclick = () => {
                    promptTextarea.value = task.prompt || '';
                    saveConfig();
                    generateBtn.click();
                };
                const deleteBtn = document.createElement('button');
                deleteBtn.className = 'task-action-btn action-delete';
                deleteBtn.innerHTML = '🗑️ 删除';
                deleteBtn.onclick = async () => {
                    try { await deleteTaskFromDB(task.timestamp); } catch(e) {}
                    card.remove();
                    if (tasksContainer.children.length === 0) {
                        tasksContainer.innerHTML = '<div style="color:#777; text-align:center; grid-column:1/-1; padding:40px;">暂无历史记录</div>';
                    }
                };
                actionsDiv.appendChild(regenBtn);
                actionsDiv.appendChild(deleteBtn);
                contentDiv.appendChild(actionsDiv);

                card.appendChild(header);
                card.appendChild(contentDiv);
                tasksContainer.appendChild(card);
            });
        } catch (e) {
            console.warn('加载历史失败', e);
            tasksContainer.innerHTML = '<div style="color:#f48771; text-align:center;">加载历史失败</div>';
        }
    }
